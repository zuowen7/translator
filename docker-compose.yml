# Scholar Translate - Docker Compose 部署
#
# 使用方法:
#   docker compose up -d           # 启动所有服务
#   浏览器打开 http://localhost:18088
#   docker compose down             # 停止
#   docker compose logs -f app      # 查看日志
#
# 首次使用需要拉取模型:
#   docker compose exec ollama ollama pull qwen3:8b
#
# GPU 加速: 取消注释 ollama 服务的 deploy 块

services:
  # ---- Ollama 推理服务 ----
  ollama:
    image: ollama/ollama:0.6.4
    container_name: scholar-ollama
    # BUG-07: 不暴露端口到主机，仅容器内部通信
    # 调试时手动添加: ports: ["11434:11434"]
    volumes:
      - ollama_data:/root/.ollama
    # BUG-19: 非 root 用户 (ollama 镜像内置 ollama 用户)
    user: "1000:1000"
    # BUG-06: 健康检查
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    # GPU 加速: 取消注释以下 deploy 块 (需要 NVIDIA Container Toolkit)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    # BUG-20: 资源限制
    deploy:
      resources:
        limits:
          memory: 8G
    restart: unless-stopped

  # ---- 翻译 Web 应用 ----
  app:
    build: .
    container_name: scholar-translate
    ports:
      - "18088:18088"
    # BUG-08: 等待 Ollama 健康后才启动
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      # 与 api.py 中 DATA_DIR=/app/data 一致
      - ./data/input:/app/data/input
      - ./data/output:/app/data/output
    environment:
      - DOCKER_MODE=1
      - OLLAMA_HOST=http://ollama:11434
    # BUG-06: 健康检查
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:18088/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 2G
    restart: unless-stopped

volumes:
  ollama_data:
