# Scholar Translate - Docker Compose 一键部署
#
# 使用方法:
#   docker compose up -d           # 启动所有服务 (Ollama + Web UI)
#   浏览器打开 http://localhost:18088
#   docker compose down             # 停止
#   docker compose logs -f app      # 查看翻译日志
#
# 首次使用需要拉取模型:
#   docker compose exec ollama ollama pull qwen3:8b

services:
  # ---- Ollama 推理服务 ----
  ollama:
    image: ollama/ollama:latest
    container_name: scholar-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # GPU 加速 (需要 NVIDIA Docker Runtime)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    # 如只用 CPU，注释掉上面 deploy 块即可
    restart: unless-stopped

  # ---- 翻译 Web 应用 (前端 + 后端) ----
  app:
    build: .
    container_name: scholar-translate
    ports:
      - "18088:18088"
    depends_on:
      - ollama
    volumes:
      - ./data/input:/data/input
      - ./data/output:/data/output
    environment:
      - OLLAMA_HOST=http://ollama:11434
    restart: unless-stopped

volumes:
  ollama_data:
