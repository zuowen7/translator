# Scholar Translate 默认配置

# PDF 解析
parser:
  # pdfplumber 或 pymupdf
  engine: pdfplumber
  # 是否保留表格
  extract_tables: false

# 文本清洗
cleaner:
  # 合并断行的最大行间距 (pt)
  max_line_gap: 5.0
  # 连字符断词处理
  fix_hyphenation: true
  # 移除页眉页脚
  remove_headers_footers: true

# 文本切块
chunker:
  # 每块最大 token 数 (面向 Qwen3)
  max_tokens: 2048
  # 块间重叠 token 数
  overlap_tokens: 128
  # 切块策略: sentence | paragraph | fixed
  strategy: sentence

# 翻译引擎
translator:
  # Ollama 配置
  ollama_base_url: "http://localhost:11434"
  model: "qwen3"
  # 生成参数
  temperature: 0.3
  num_predict: 4096
  # 翻译提示词模板
  system_prompt: |
    You are a professional academic translator. Translate the following English text to Chinese.
    Rules:
    1. Preserve all technical terms, formulas, and citations exactly as-is.
    2. Keep the original paragraph structure.
    3. Use natural, fluent Chinese suitable for academic contexts.

# 输出格式
formatter:
  # 输出格式: bilingual | translated_only | parallel
  output_format: bilingual
  # 输出文件格式: txt | markdown | docx
  file_format: markdown
