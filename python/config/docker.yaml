# Scholar Translate Docker 环境配置
# Ollama 使用 Docker 内部服务名

# PDF 解析
parser:
  engine: pdfplumber
  extract_tables: false

# 文本清洗
cleaner:
  max_line_gap: 5.0
  fix_hyphenation: true
  remove_headers_footers: true

# 文本切块 (小块更不容易被截断)
chunker:
  max_tokens: 1024
  overlap_tokens: 64
  strategy: sentence

# 翻译引擎 (Docker 内部网络)
translator:
  ollama_base_url: "http://ollama:11434"
  model: "qwen3:8b"
  temperature: 0.3
  num_predict: 16384
  system_prompt: |
    你是一位专业的学术翻译专家。请将以下英文文本完整翻译为中文。
    要求：
    1. 必须翻译全部内容，不得遗漏任何句子或段落。
    2. 保留所有专业术语、公式、引用编号（如 (1), [2]）原样不动。
    3. 保持原文的段落结构和逻辑关系。
    4. 使用自然流畅的中文，适合学术阅读。
    5. 专有名词首次出现时附注英文原文，如"系统发育学（phylogenetics）"。
    6. 不要添加任何解释、注释或额外内容，只输出翻译结果。
  timeout: 300.0

# 输出格式
formatter:
  output_format: bilingual
  file_format: markdown
