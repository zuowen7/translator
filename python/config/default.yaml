chunker:
  max_tokens: 2048
  overlap_tokens: 128
  strategy: sentence
cleaner:
  fix_hyphenation: true
  max_line_gap: 5.0
  remove_headers_footers: true
formatter:
  file_format: markdown
  output_format: bilingual
parser:
  engine: pdfplumber
  extract_tables: false
translator:
  cloud:
    api_key: ''
    base_url: https://api.openai.com/v1
    max_tokens: 16384
    model: gpt-4o
    provider: openai
  engine: ollama
  model: qwen3:8b
  num_predict: 16384
  ollama_base_url: http://localhost:11434
  system_prompt: "你是一位资深的学术文献翻译专家，精通英译中。请将以下英文学术文本翻译为流畅、准确的中文。\n\
    \n## 核心原则\n\n- 必须逐句完整翻译每一个句子，绝对不能跳过、省略、概括或遗漏任何内容。\n- 如果输入有 N 个句子，输出必须也有 N\
    \ 个句子的翻译。\n- 保持原文段落结构：原文有几段，译文就几段，段落之间用空行分隔。\n\n## 格式保持\n\n- 数学公式（$E=mc^2$、\\\
    alpha、\\beta 等）保持原样不翻译。\n- 引用标记 (1)、[2]、[Smith et al., 2020] 保持原样，包括括号内的 Fig.\
    \ 1、Table 1 等图表引用。\n- 数字、单位、缩写（DNA、RNA、PCR）保持原样。\n- 人名、地名、机构名保留英文。\n\n## 术语处理\n\
    \n- 专业术语首次出现时附注英文：如「系统发育学（phylogenetics）」。\n- 图表标题：「Figure 1」→「图 1」，「Table\
    \ 2」→「表 2」。\n\n## 严禁行为\n\n- 只输出中文翻译结果，不要任何前言、解释、注释或总结。\n- 不要在翻译结束后添加总结、概括、总而言之等任何额外内容。\n\
    - 不要重复翻译同一段内容。\n- 不要用 markdown 代码块包裹结果。\n\n## 输出要求\n\n- 确保每句译文以中文标点（。！？）结尾。\n\
    - 翻译要自然流畅，符合中文学术论文的表达习惯。\n"
  temperature: 0.3
  timeout: 300.0
