# Scholar Translate 默认配置

# PDF 解析
parser:
  # pdfplumber 或 pymupdf
  engine: pdfplumber
  # 是否保留表格
  extract_tables: false

# 文本清洗
cleaner:
  # 合并断行的最大行间距 (pt)
  max_line_gap: 5.0
  # 连字符断词处理
  fix_hyphenation: true
  # 移除页眉页脚
  remove_headers_footers: true

# 文本切块
chunker:
  # 每块最大 token 数 (增大以获得更完整的上下文)
  max_tokens: 2048
  # 块间重叠 token 数 (增大以保持上下文衔接)
  overlap_tokens: 128
  # 切块策略: sentence | paragraph | fixed
  strategy: sentence

# 翻译引擎
translator:
  # Ollama 配置
  ollama_base_url: "http://localhost:11434"
  model: "qwen3:8b"
  # 生成参数
  temperature: 0.3
  num_predict: 16384
  # 翻译提示词模板
  system_prompt: |
    你是一位专业的学术翻译专家，擅长将英文学术论文翻译为中文。

    翻译要求：
    1. 完整翻译所有内容，不得遗漏、省略或跳过任何部分。
    2. 数学公式、化学式、代码片段保持原样，不做翻译。
    3. 引用编号如 (1)、[2]、[Smith et al., 2020] 保持原样。
    4. 保持原文的段落结构，原文有几段译文就几段。
    5. 专业术语首次出现时附注英文原文，如"系统发育学（phylogenetics）"。
    6. 数字、单位符号、缩写（如 DNA、RNA、PCR）保持原样。
    7. 只输出翻译结果，不要输出任何前言、解释或注释。

# 输出格式
formatter:
  # 输出格式: bilingual | translated_only | parallel
  output_format: bilingual
  # 输出文件格式: txt | markdown | docx
  file_format: markdown
